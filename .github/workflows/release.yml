name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-ubuntu:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build deps (Ubuntu)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            qt6-base-dev \
            qt6-base-dev-tools

      - name: Build
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build -j$(nproc)

      - name: Package artifacts
        run: |
          set -e
          TAG="${GITHUB_REF_NAME}"
          OUTDIR="release/Limits_droper-${TAG}-linux-ubuntu"
          mkdir -p "$OUTDIR"
          cp build/mchbar_read "$OUTDIR/"
          cp build/mchbar_pl_write "$OUTDIR/"
          cp build/mchbar_scan "$OUTDIR/"
          cp build/limits_ui "$OUTDIR/"
          cp build/limits_helper "$OUTDIR/"
          cp build/limits_ui_qt "$OUTDIR/"
          cp helper/com.limits_droper.helper.policy "$OUTDIR/"
          cp README.md "$OUTDIR/"
          mkdir -p "$OUTDIR/assets"
          cp assets/limits_droper.desktop "$OUTDIR/assets/"
          cp assets/limits_droper.svg "$OUTDIR/assets/"
          tar -czf "Limits_droper-${TAG}-linux-ubuntu.tar.gz" -C release "Limits_droper-${TAG}-linux-ubuntu"

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Limits_droper-*-linux-ubuntu.tar.gz

  build-fedora:
    runs-on: ubuntu-latest
    container: fedora:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build deps (Fedora)
        run: |
          dnf -y update
          dnf -y install \
            gcc \
            gcc-c++ \
            make \
            cmake \
            qt6-qtbase-devel

      - name: Build
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build -j$(nproc)

      - name: Package artifacts
        run: |
          set -e
          TAG="${GITHUB_REF_NAME}"
          OUTDIR="release/Limits_droper-${TAG}-linux-fedora"
          mkdir -p "$OUTDIR"
          cp build/mchbar_read "$OUTDIR/"
          cp build/mchbar_pl_write "$OUTDIR/"
          cp build/mchbar_scan "$OUTDIR/"
          cp build/limits_ui "$OUTDIR/"
          cp build/limits_helper "$OUTDIR/"
          cp build/limits_ui_qt "$OUTDIR/"
          cp helper/com.limits_droper.helper.policy "$OUTDIR/"
          cp README.md "$OUTDIR/"
          mkdir -p "$OUTDIR/assets"
          cp assets/limits_droper.desktop "$OUTDIR/assets/"
          cp assets/limits_droper.svg "$OUTDIR/assets/"
          tar -czf "Limits_droper-${TAG}-linux-fedora.tar.gz" -C release "Limits_droper-${TAG}-linux-fedora"

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Limits_droper-*-linux-fedora.tar.gz
